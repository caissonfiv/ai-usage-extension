<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>AI 用量</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #18181a;
    --surface: #242428;
    --surface2: #2e2e34;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e7e2;
    --text2: #9a9a92;
    --text3: #5c5c56;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --blue: #60a5fa;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    width: 340px;
    min-height: 200px;
    max-width: 100%;
    font-size: 13px;
    line-height: 1.4;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }

  .header-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .pulse {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .header-actions {
    display: flex;
    gap: 6px;
  }

  .icon-btn {
    width: 26px; height: 26px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2);
    font-size: 14px;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }

  .content { padding: 10px 12px 12px; }

  .source-block {
    margin-bottom: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .source-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px 8px;
    border-bottom: 1px solid var(--border);
  }

  .source-identity {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .source-icon {
    font-size: 16px;
    line-height: 1;
  }

  .source-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .source-time {
    font-size: 11px;
    color: var(--text3);
  }

  .source-link {
    font-size: 11px;
    color: var(--blue);
    text-decoration: none;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid rgba(96,165,250,0.2);
    transition: all 0.15s;
  }
  .source-link:hover { background: rgba(96,165,250,0.1); }

  .metrics-list { padding: 8px 12px 10px; display: flex; flex-direction: column; gap: 8px; }

  .metric {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .metric-label { font-size: 11px; color: var(--text2); }

  .metric-value {
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .metric-sub { font-size: 10px; color: var(--text3); }

  .bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .stale-notice {
    font-size: 10px;
    color: var(--amber);
    padding: 4px 12px 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .empty-state {
    text-align: center;
    padding: 28px 20px;
    color: var(--text3);
  }
  .empty-state .big { font-size: 28px; margin-bottom: 8px; }
  .empty-state p { font-size: 12px; line-height: 1.6; }

  .empty-links {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .open-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    text-decoration: none;
    color: var(--text);
    font-size: 12px;
    transition: all 0.15s;
    cursor: pointer;
  }
  .open-link:hover { background: var(--surface2); border-color: var(--border2); }

  .open-link-left { display: flex; align-items: center; gap: 8px; }
  .open-link-arrow { color: var(--text3); font-size: 14px; }

  /* Manual edit modal */
  .modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal.open { display: flex; }

  .modal-sheet {
    background: var(--surface);
    border-radius: 14px 14px 0 0;
    padding: 16px;
    width: 100%;
    border-top: 1px solid var(--border2);
  }

  .modal-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .field input {
    width: 100%;
    font-size: 13px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    outline: none;
    font-family: inherit;
  }
  .field input:focus { border-color: rgba(96,165,250,0.5); }

  .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
  .btn {
    flex: 1;
    padding: 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn:hover { background: var(--surface2); color: var(--text); }
  .btn.primary { background: var(--blue); border-color: transparent; color: #fff; }
  .btn.primary:hover { opacity: 0.85; }

  .footer {
    border-top: 1px solid var(--border);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-text { font-size: 10px; color: var(--text3); }

  .refresh-btn {
    font-size: 11px;
    color: var(--blue);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.15s;
    font-family: inherit;
  }
  .refresh-btn:hover { background: rgba(96,165,250,0.1); }
</style>
</head>
<body>
<div class="header">
  <div class="header-title">
    <div class="pulse" id="pulse-dot"></div>
    AI 用量
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="popout-btn" title="独立窗口">⤢</button>
    <button class="icon-btn" id="manual-btn" title="手动编辑">✎</button>
    <button class="icon-btn" id="refresh-all-btn" title="刷新所有页面">↻</button>
  </div>
</div>

<div class="content" id="content">
  <div class="empty-state">
    <div class="big">📊</div>
    <p>加载中…</p>
  </div>
</div>

<div class="footer">
  <div class="footer-left">
    <button class="auto-btn" id="auto-toggle-wrap">
      <div class="auto-dot" id="auto-dot"></div>
      <span class="auto-label" id="auto-label">自动刷新</span>
    </button>
    <span class="countdown" id="countdown"></span>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <span class="footer-text" id="footer-text"></span>
    <button class="refresh-btn" id="refresh-btn">立即刷新</button>
  </div>
</div>

<!-- Manual Edit Modal -->
<div class="modal" id="modal">
  <div class="modal-sheet">
    <div class="modal-title">
      手动更新数据
      <button class="icon-btn" id="modal-close" style="border:none;background:none;font-size:16px;color:var(--text3);cursor:pointer">✕</button>
    </div>
    <div id="manual-form"></div>
    <div class="modal-actions">
      <button class="btn" id="modal-cancel">取消</button>
      <button class="btn primary" id="modal-save">保存</button>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
